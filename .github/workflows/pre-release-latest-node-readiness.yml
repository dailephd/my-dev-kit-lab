name: Pre-release Node 26 readiness

on:
  workflow_dispatch:

  push:
    branches:
      - release/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-node-readiness:
    name: ${{ matrix.os }} / Node 26
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          python --version

      - name: Install dependencies
        run: npm ci

      - name: Check documentation consistency
        run: npm run docs:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit tests
        run: npx vitest run tests/audits

      - name: Test
        run: npm run test

      - name: Verify
        run: npm run verify

      - name: Code rot audit
        run: npm run audit -- --types code-rot --format text,json --fail-on none

      - name: Security validation
        run: npm run security:validate -- --format text,json

      - name: Package dry run
        run: npm pack --dry-run

      - name: Upload readiness reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: readiness-reports-${{ matrix.os }}-node-26
          path: |
            reports/audits/code-rot/
            reports/security/
          if-no-files-found: warn
          retention-days: 7